name: CI

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Quality and Container Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run Ruff lint
        run: ruff check .

      - name: Check Ruff formatting
        run: ruff format --check .

      - name: Run Pytest
        run: python -m pytest

      - name: Audit runtime dependencies
        run: pip-audit -r requirements.txt

      - name: Build Docker image
        run: docker build --pull --tag flask-cicd-aws:ci .

      - name: Start application container
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_TAG="sha-${GITHUB_SHA::7}"
          DEPLOY_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          docker run \
            --detach \
            --name flask-cicd-aws-ci \
            --publish 5000:5000 \
            --env APP_VERSION="$IMAGE_TAG" \
            --env IMAGE_TAG="$IMAGE_TAG" \
            --env DEPLOY_ENV=ci \
            --env DEPLOY_TIME="$DEPLOY_TIME" \
            flask-cicd-aws:ci

      - name: Verify application endpoints
        shell: bash
        run: |
          set -euo pipefail

          EXPECTED_TAG="sha-${GITHUB_SHA::7}"
          READY=false

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5000/health > /tmp/health.json; then
              echo "Application ready on attempt $attempt"
              READY=true
              break
            fi

            sleep 1
          done

          test "$READY" = "true"

          curl -fsS http://127.0.0.1:5000/version > /tmp/version.json
          curl -fsS http://127.0.0.1:5000/metadata > /tmp/metadata.json

          python3 -c '
          import json
          import os

          expected = "sha-" + os.environ["GITHUB_SHA"][:7]

          with open("/tmp/health.json") as file:
              health = json.load(file)

          with open("/tmp/version.json") as file:
              version = json.load(file)

          with open("/tmp/metadata.json") as file:
              metadata = json.load(file)

          assert health["status"] == "ok"
          assert health["version"] == expected
          assert version["image_tag"] == expected
          assert version["version"] == expected
          assert metadata["environment"] == "ci"
          assert metadata["hostname"]
          '

      - name: Verify non-root container identity
        shell: bash
        run: |
          set -euo pipefail

          CONFIGURED_USER="$(
            docker inspect flask-cicd-aws-ci \
              --format '{{.Config.User}}'
          )"

          RUNTIME_UID="$(docker exec flask-cicd-aws-ci id -u)"

          echo "Configured user: $CONFIGURED_USER"
          echo "Runtime UID: $RUNTIME_UID"

          test "$CONFIGURED_USER" = "10001:10001"
          test "$RUNTIME_UID" = "10001"

      - name: Show container logs on failure
        if: failure()
        run: docker logs flask-cicd-aws-ci || true

      - name: Remove test container
        if: always()
        run: docker rm --force flask-cicd-aws-ci 2>/dev/null || true
